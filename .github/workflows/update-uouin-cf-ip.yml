name: Update CF IPs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-uouin-cf-ip.yml"
      - "scripts/uouin-html-to-addresses.mjs"
  schedule:
    # 20:20 UTC = 04:20 Asia/Shanghai.
    - cron: "20 20 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Render and convert Cloudflare IP table
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
          INCLUDE_IPV6: "false"
          PER_GROUP_LIMIT: "10"
          GSLEGE_ENABLED: "true"
          GSLEGE_REGIONS: "JP,SG,US"
          GSLEGE_PER_REGION_LIMIT: "10"
          MAX_AGE_HOURS: "48"
        run: |
          node scripts/uouin-html-to-addresses.mjs > addressesapi.txt
          test -s addressesapi.txt
          head -n 5 addressesapi.txt

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add addressesapi.txt
          git diff --cached --quiet || git commit -m "chore: update cf ips"
          git push
